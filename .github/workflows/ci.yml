name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 . --max-line-length=160 --exclude=.venv,datasets/synthetic_media,build,dist

      - name: Security scan (bandit)
        run: bandit -r . -x ./tests,./.venv -ll

      - name: Generate local synthetic dataset (no external data/network needed)
        run: python3 datasets/generators/synthetic_data_generator.py --out datasets/synthetic_media --n 40

      - name: Train classifier (required by downstream tests)
        run: python3 artifact-detection/classifier/synthetic_classifier.py

      - name: Run unit + integration tests
        run: pytest tests/ -q --cov=. --cov-report=term-missing

  llm-interface-mock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Verify LLM layer falls back to Mock cleanly with no Ollama server
        run: |
          python3 -c "
          from importlib import import_module
          import sys, os
          sys.path.insert(0, 'llm-layer')
          import llm_interface as li
          client = li.get_default_client()
          assert client.backend_name == 'mock', f'expected mock backend in CI, got {client.backend_name}'
          out = client.draft_forensic_narrative({'overall_verdict': 'LIKELY_SYNTHETIC', 'overall_confidence': 0.9, 'evidence_description': 'test'}, [])
          assert isinstance(out, str) and len(out) > 0
          print('LLM interface mock fallback OK')
          "
